<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 430" font-family="Arial,sans-serif">
  <rect width="420" height="430" fill="#fff" rx="8" stroke="#e0e0e0"/>
  <g stroke="#f0f0f0" stroke-width="1">
    <line x1="30" y1="60" x2="390" y2="60"/><line x1="30" y1="120" x2="390" y2="120"/>
    <line x1="30" y1="180" x2="390" y2="180"/><line x1="30" y1="240" x2="390" y2="240"/>
    <line x1="30" y1="300" x2="390" y2="300"/><line x1="30" y1="360" x2="390" y2="360"/>
    <line x1="90" y1="30" x2="90" y2="390"/><line x1="150" y1="30" x2="150" y2="390"/>
    <line x1="210" y1="30" x2="210" y2="390"/><line x1="270" y1="30" x2="270" y2="390"/>
    <line x1="330" y1="30" x2="330" y2="390"/><line x1="390" y1="30" x2="390" y2="390"/>
  </g>
  <line x1="20" y1="300" x2="400" y2="300" stroke="#333" stroke-width="2"/>
  <polygon points="402,300 393,295 393,305" fill="#333"/>
  <line x1="210" y1="400" x2="210" y2="20" stroke="#333" stroke-width="2"/>
  <polygon points="210,18 205,28 215,28" fill="#333"/>
  <text x="406" y="304" font-size="15" fill="#333">x</text>
  <text x="205" y="14" font-size="15" fill="#333">y</text>
  <!-- Parabola y = x^2/60, vertex at (210,360), 1 unit = 60px -->
  <path d="M 50,390 C 80,310 140,268 210,260 C 280,268 340,310 370,390"
        stroke="#1565c0" stroke-width="2.5" fill="none"/>
  <!-- Vertex -->
  <circle cx="210" cy="260" r="5" fill="#1565c0"/>
  <text x="218" y="258" font-size="12" fill="#1565c0">Вершина (0,0)</text>
  <!-- Focus at (210, 245) — one unit above vertex = 15px -->
  <circle cx="210" cy="245" r="5" fill="#e53935"/>
  <text x="218" y="242" font-size="12" fill="#e53935">Фокус F</text>
  <!-- Directrix at y = 275 -->
  <line x1="40" y1="275" x2="380" y2="275" stroke="#e53935" stroke-width="1.5" stroke-dasharray="7,4"/>
  <text x="384" y="272" font-size="11" fill="#e53935">директриса</text>
  <!-- Axis of symmetry -->
  <line x1="210" y1="50" x2="210" y2="390" stroke="#888" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="214" y="316" font-size="11" fill="#777">0</text>
  <text x="210" y="418" font-size="12" fill="#555" text-anchor="middle">Парабола y = x²</text>
</svg>
