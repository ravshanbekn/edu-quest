<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 420" font-family="Arial,sans-serif">
  <rect width="420" height="420" fill="#fff" rx="8" stroke="#e0e0e0"/>
  <line x1="20" y1="210" x2="400" y2="210" stroke="#333" stroke-width="2"/>
  <polygon points="402,210 393,205 393,215" fill="#333"/>
  <line x1="210" y1="400" x2="210" y2="20" stroke="#333" stroke-width="2"/>
  <polygon points="210,18 205,28 215,28" fill="#333"/>
  <text x="406" y="214" font-size="15" fill="#333">x</text>
  <text x="205" y="14" font-size="15" fill="#333">y</text>
  <!-- Unit circle, radius 150px -->
  <circle cx="210" cy="210" r="150" fill="none" stroke="#1565c0" stroke-width="2"/>
  <!-- 0° = (360, 210) -->
  <circle cx="360" cy="210" r="4" fill="#1565c0"/>
  <text x="364" y="207" font-size="11" fill="#1565c0">0°</text>
  <!-- 90° = (210, 60) -->
  <circle cx="210" cy="60" r="4" fill="#1565c0"/>
  <text x="215" y="57" font-size="11" fill="#1565c0">90°</text>
  <!-- 180° = (60, 210) -->
  <circle cx="60" cy="210" r="4" fill="#1565c0"/>
  <text x="20" y="207" font-size="11" fill="#1565c0">180°</text>
  <!-- 270° = (210, 360) -->
  <circle cx="210" cy="360" r="4" fill="#1565c0"/>
  <text x="215" y="375" font-size="11" fill="#1565c0">270°</text>
  <!-- 45° = (210+150cos45, 210-150sin45) ≈ (316,104) -->
  <circle cx="316" cy="104" r="4" fill="#e53935"/>
  <line x1="210" y1="210" x2="316" y2="104" stroke="#e53935" stroke-width="1.5"/>
  <text x="320" y="101" font-size="11" fill="#e53935">45°</text>
  <!-- sin/cos labels -->
  <line x1="316" y1="104" x2="316" y2="210" stroke="#e53935" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="210" y1="104" x2="316" y2="104" stroke="#2e7d32" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="320" y="162" font-size="11" fill="#e53935">sin 45°</text>
  <text x="248" y="100" font-size="11" fill="#2e7d32">cos 45°</text>
  <!-- axis labels -->
  <text x="355" y="226" font-size="11" fill="#777">1</text>
  <text x="55" y="226" font-size="11" fill="#777">-1</text>
  <text x="215" y="64" font-size="11" fill="#777">1</text>
  <text x="215" y="356" font-size="11" fill="#777">-1</text>
  <text x="210" y="413" font-size="12" fill="#555" text-anchor="middle">Единичная окружность и тригонометрические функции</text>
</svg>
