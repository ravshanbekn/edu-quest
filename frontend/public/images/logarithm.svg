<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 420" font-family="Arial,sans-serif">
  <rect width="420" height="420" fill="#fff" rx="8" stroke="#e0e0e0"/>
  <g stroke="#f0f0f0" stroke-width="1">
    <line x1="60" y1="30" x2="60" y2="390"/><line x1="120" y1="30" x2="120" y2="390"/>
    <line x1="180" y1="30" x2="180" y2="390"/><line x1="240" y1="30" x2="240" y2="390"/>
    <line x1="300" y1="30" x2="300" y2="390"/><line x1="360" y1="30" x2="360" y2="390"/>
    <line x1="30" y1="90" x2="390" y2="90"/><line x1="30" y1="150" x2="390" y2="150"/>
    <line x1="30" y1="210" x2="390" y2="210"/><line x1="30" y1="270" x2="390" y2="270"/>
    <line x1="30" y1="330" x2="390" y2="330"/>
  </g>
  <line x1="20" y1="210" x2="400" y2="210" stroke="#333" stroke-width="2"/>
  <polygon points="402,210 393,205 393,215" fill="#333"/>
  <line x1="60" y1="400" x2="60" y2="20" stroke="#333" stroke-width="2"/>
  <polygon points="60,18 55,28 65,28" fill="#333"/>
  <text x="406" y="214" font-size="15" fill="#333">x</text>
  <text x="55" y="14" font-size="15" fill="#333">y</text>
  <!-- log base 2: passes through (1,0)=(120,210), scale 60px/unit -->
  <!-- x=1→120, x=2→180, x=4→240, x=8→300; y=log2(x)*60 -->
  <path d="M 75,330 C 90,280 105,240 120,210 C 150,163 180,130 240,90 C 300,55 360,35 390,26"
        stroke="#1565c0" stroke-width="2.2" fill="none"/>
  <text x="392" y="26" font-size="11" fill="#1565c0">log₂x</text>
  <!-- log base 10: x=1→120, x=10→660 (off screen), use approximate -->
  <path d="M 75,340 C 90,305 105,270 120,210 C 150,185 180,168 240,148 C 300,132 360,120 390,114"
        stroke="#e53935" stroke-width="2.2" fill="none"/>
  <text x="392" y="114" font-size="11" fill="#e53935">log₁₀x</text>
  <!-- natural log -->
  <path d="M 75,332 C 90,285 105,250 120,210 C 150,168 180,140 240,103 C 300,72 360,50 390,42"
        stroke="#2e7d32" stroke-width="2.2" fill="none"/>
  <text x="392" y="42" font-size="11" fill="#2e7d32">ln x</text>
  <!-- x=1 vertical -->
  <line x1="120" y1="180" x2="120" y2="240" stroke="#888" stroke-width="1" stroke-dasharray="4,3"/>
  <circle cx="120" cy="210" r="4" fill="#555"/>
  <text x="116" y="226" font-size="11" fill="#555">1</text>
  <text x="210" y="413" font-size="12" fill="#555" text-anchor="middle">Логарифмические функции с разными основаниями</text>
</svg>
