spring:
  application:
    name: edu-quest-backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/eduquest}
    username: ${DB_USERNAME:eduquest}
    password: ${DB_PASSWORD:eduquest}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8090