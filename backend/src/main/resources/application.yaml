spring:
  application:
    name: edu-quest-backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/eduquest}
    username: ${DB_USERNAME:eduquest}
    password: ${DB_PASSWORD:eduquest}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8090

  servlet:
    multipart:
      max-file-size: 200MB
      max-request-size: 200MB

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
      maximum-expected-value:
        http.server.requests: 10s
      minimum-expected-value:
        http.server.requests: 1ms

logging:
  logstash:
    host: ${LOGSTASH_HOST:localhost}
    port: ${LOGSTASH_PORT:5000}

app:
  jwt:
    secret: ${JWT_SECRET:eduquest-dev-secret-key-min-256-bits-long-enough-here}
    access-expiration-ms: 900000       # 15 минут
    refresh-expiration-ms: 604800000   # 7 дней
  minio:
    url: ${MINIO_URL:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin}
    bucket: ${MINIO_BUCKET:eduquest}
    public-url: ${MINIO_PUBLIC_URL:http://localhost:9000}